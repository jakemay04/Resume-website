<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        /* Modern Dark Theme */
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        h1 {
            margin-bottom: 5px;
            letter-spacing: 5px;
            color: #4CAF50;
        }

        #game-container {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }

        canvas {
            display: block;
            background-color: #000;
        }

        .score-board {
            font-size: 24px;
            margin: 10px 0;
            color: #4CAF50;
        }

        .instructions {
            margin-top: 10px;
            color: #888;
            font-size: 0.9rem;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 25px;
            background-color: transparent;
            color: #4CAF50;
            border: 2px solid #4CAF50;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background-color: #4CAF50;
            color: #000;
        }
    </style>
</head>
<body>

    <h1>SNAKE</h1>
    <div class="score-board">Score: <span id="scoreText">0</span></div>

    <div id="game-container">
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
    </div>

    <div class="instructions">Use Arrow Keys to Move</div>
    
    <a href="../index.html" class="btn">EXIT GAME</a>

    <script>
        const canvas = document.getElementById("snakeCanvas");
        const ctx = canvas.getContext("2d");
        const scoreText = document.getElementById("scoreText");

        // Game Constants
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        // Game Variables
        let score = 0;
        let dx = 0;
        let dy = 0;
        let snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
        let food = {x: 5, y: 5};
        let gameOver = false;

        function main() {
            if (didGameEnd()) {
                showGameOver();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Subtle Grid Lines
            ctx.strokeStyle = "#111";
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#4CAF50" : "#2E7D32"; // Head is lighter green
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            if (dx === 0 && dy === 0) return; // Don't move until key is pressed

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreText.innerHTML = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            // Hit Walls
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) return true;
            
            // Hit Self
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            // Make sure food doesn't spawn on snake body
            snake.forEach(part => {
                if(part.x === food.x && part.y === food.y) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#FF5252"; // Red apple
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function showGameOver() {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "30px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 10);
            ctx.font = "15px Courier New";
            ctx.fillText("Press SPACE to Restart", canvas.width/2, canvas.height/2 + 30);
            gameOver = true;
        }

        function handleInput(event) {
            const keyPressed = event.keyCode;
            const LEFT = 37, UP = 38, RIGHT = 39, DOWN = 40, SPACE = 32;

            if (gameOver && keyPressed === SPACE) {
                location.reload();
            }

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === LEFT && !goingRight) { dx = -1; dy = 0; }
            if (keyPressed === UP && !goingDown) { dx = 0; dy = -1; }
            if (keyPressed === RIGHT && !goingLeft) { dx = 1; dy = 0; }
            if (keyPressed === DOWN && !goingUp) { dx = 0; dy = 1; }
        }

        document.addEventListener("keydown", handleInput);

        createFood();
        main();
    </script>
</body>
</html>
